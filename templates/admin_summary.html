<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Summary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">   
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="top">
                <nav class="navbar navbar-expand-lg bg-body-tertiary shadow">                    
                    <div class="container-fluid">
                        <a class="navbar-brand">Welcome {{this_user.username}}</a>
                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                                <span class="navbar-toggler-icon"></span>
                            </button>
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                                <form class="d-flex" method="GET" action="{{ url_for('search') }}">                                    
                                    <input class="form-control me-2" type="search" placeholder="Students, Companies" aria-label="Search" name="search">
                                    <select class="form-select me-2" aria-label="Default select example" name='key'>
                                        <option selected>Choose</option>
                                        <option value="student">Student</option>
                                        <option value="company">Company</option>
                                    </select>
                                    <input class="btn btn-outline-success" type="submit" value="Search"> 
                                </form>
                                <li class="nav-item mx-2">
                                    <a class="btn btn-outline-success me-2" href="{{ url_for('admin') }}">Back</a>
                                </li>
                                <li class="nav-item mx-2">
                                    <a class="btn btn-outline-danger me-2" href="{{ url_for('logout') }}">Logout</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="text-center"><br>
                <h4>Historical Placement Data</h4>
            </div><br><br>
            <div id="content">
                <div class="row">
                    <div class="col-md-6 text-center">
                        <h5>Summary</h5>
                        <img src='/static/bar.png', width=500, height="500" alt="Bar chart" class="img-fluid">
                    </div>
                    <div class="col-md-6 text-center">
                        <h5>Status of Applications</h5>
                        <img src = '/static/pie.png', width=500, height="500" alt="Pie chart" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
