<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    #inside-content{
        margin-top: -17px;
        padding: 20px;
        height:456px;
        width: 80%;
    }
</style>
</head> 
<body>
    <div id="main">
        <div id="canvas"><br>
            <div id="top">
                <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand">Welcome {{this_user.username}}</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="{{ url_for('student') }}">Back</a>
                            </li>
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="#">History</a>         
                            </li>
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="{{ url_for('std_edit_profile') }}">Edit Profile</a>
                            </li>
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-danger me-2" href="{{ url_for('logout') }}">Logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
                </nav>
            </div><br>
            <div class="text-center">
                <h4>Student Application Status</h4><br>
            </div>
            <div id="inside-content">                    
                <form action="{{ url_for('std_status', app_id=application.id, drive_id=application.drive_id) }}" class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" value="{{ application.student.username }}" aria-label="Disabled input example" disabled readonly>                   
                    </div>
                        <div class="col-md-6">
                        <label for="id" class="form-label">Student ID</label>
                        <input type="text" class="form-control" value="{{ application.student.id }}" aria-label="Disabled input example" disabled readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="gender" class="form-label">Gender</label>
                        <input type="text" class="form-control" value="{{ application.student.gender }}" aria-label="Disabled input example" disabled readonly>                   
                    </div>
                    <div class="col-md-6">
                        <label for="age" class="form-label">Age</label>
                        <input type="text" class="form-control" value="{{ application.student.age }}" aria-label="Disabled input example" disabled readonly>                   
                    </div>
                    <div class="col-md-6">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" class="form-control" value="{{ application.student.department }}" aria-label="Disabled input example" disabled readonly>                   
                    </div>
                    <div class="col-md-6">
                        <label for="cgpa" class="form-label">CGPA</label>
                        <input type="text" class="form-control" value="{{ application.student.cgpa }}" aria-label="Disabled input example" disabled readonly>                   
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <a href="{{ application.student.resume }}" target="_blank" class="btn btn-info w-100">
                            View Resume
                        </a>
                    </div>
                    <div class="col-md-6">
                        <label for="status" class="form-label">Status</label>
                        <input type="text" class="form-control" value="{{ application.status }}" aria-label="Disabled input example" disabled readonly>                   
                    </div><br>
                    <div class="col-md-6">
                        <label for="remarks" class="form-label">Remarks</label>
                        <input type="text" class="form-control" value="{{ application.remarks }}" aria-label="Disabled input example" disabled readonly>                   
                    </div>
                </form>
            </div><br>
        </div>
    </div>
</body>
</html>
