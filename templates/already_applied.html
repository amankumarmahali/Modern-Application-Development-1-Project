<!DOCTYPE html>
<html lang="en">
<head>
    <title>Already Applied</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

<style>
    #warning-body{
        height: 200px;
        width: 400px;
        margin: 130px auto;
        padding: 20px;
        border: 2px solid black;
        border-radius: 20px;
        box-shadow: 10px 10px 8px rgb(95, 221, 243);

    }
</style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="top">
                <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand">Welcome {{student.username}}</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="{{ url_for('std_view_drive_details', drive_id=drive.id) }}">Back</a>        <!--{{ url_for('create_drive') }} -->

                            </li>
                        </ul>

                </div>

            </div><br>
            <div id="warning-body">

                <h5 class="text-center">You have Already Applied for this Drive</h5>
                <h5 class="text-center">Please Try Another Drive !</h5>
            </div>
        </div>
