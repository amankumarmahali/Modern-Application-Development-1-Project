<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Drive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    #inside-content{
        padding: 20px;
        height:515px;
        width: 80%;
    }
</style>
</head> 
<body>
    <div id="main">
        <div id="canvas"><br>
            <div id="top">
                <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand">Welcome {{company.username}}</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="{{ url_for('company') }}">Back</a>
                            </li>
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="{{ url_for('create_drive') }}">Create Drive</a>
                            </li>
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-success me-2" href="{{ url_for('cmp_edit_profile') }}">Edit Profile</a>
                            </li>
                            <li class="nav-item mx-2">
                                <a class="btn btn-outline-danger me-2" href="{{ url_for('logout') }}">Logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
                </nav>
            </div><br>
            <div class="text-center">
                <h4>Update a Drive</h4>
            </div>
            <div id="inside-content">                    
                <form action="{{ url_for('update_drive', drive_id=drive.id) }}" method="post" class="row g-3">
                    
                    <div class="col-md-6">
                        <label for="name" class="form-label">Drive Name</label>
                        <input type="text" class="form-control" value="{{ drive.name }}" aria-label="Disabled input example" disabled readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" value="{{ drive.job_title }}" aria-label="Disabled input example" disabled readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="location" class="form-label">Job Location</label>
                        <input type="text" class="form-control" id="location" name="loc" required>
                    </div>
                    <div class="col-md-6">
                        <label for="salary" class="form-label">Salary Offered</label>
                        <input type="number" class="form-control" id="salary" name="sal" required>
                    </div>
                    <div class="col-12">
                        <label for="description" class="form-label">Job Description</label>
                        <input type="text" class="form-control" id="description" name="desc" required>
                    </div>
                     <div class="col-12">
                        <label for="eligibility" class="form-label">Eligibility Criteria</label>
                        <input type="text" class="form-control" id="eligibility" name="elig" required>
                    </div>
                    <div class="col-md-6">
                        <label for="deadline" class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" id="deadline" name="deadline" required>
                    </div><br>
                    <div class="text-center">   
                        <input type="submit" class="btn btn-primary" value="Update"><br>
                    </div>
                </form>
            </div><br>
        </div>
    </div>
</body>
</html>
