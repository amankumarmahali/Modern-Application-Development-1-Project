<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create a Drive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    #form-body{
        width: 370px;
        height: 560px;
        margin-top: 55px;
    }
</style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
                <form action="{{ url_for('create') }}" method="post">
                 
                    <div class="text-center">
                        <h4>Create a Drive</h4> 
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Drive Name</label>
                        <input type="text" class="form-control" id="name" name="name">                    
                    </div>
                        <div class="mb-3">
                        <label for="title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" id="title" name="title">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Job Description</label>
                        <input type="text" class="form-control" id="description" name="desc">
                    </div>
                    <div class="mb-3">
                    <label for="eligibility" class="form-label">Eligibility Criteria</label>
                    <textarea class="form-control" id="eligibility" name= "elig" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="deadline" class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" id="deadline" name="deadline">
                    </div>
                    <div class="text-center">   
                        <input type="submit" class="btn btn-primary" value="Save"><br>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
